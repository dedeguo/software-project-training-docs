site_name: 软件开发综合项目实训
site_description: 《软件开发综合项目实训——AI辅助的软件项目开发》电子教程
site_url: https://project-ai.chende.top/
# repo_url: https://github.com/dedeguo/software-project-training-docs
# repo_name: dedeguo/software-project-training-docs

theme:
  name: material
  language: zh
  palette:
    primary: indigo
    accent: blue
  features:
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow
nav:
  - 课程介绍: 
     - 课程介绍: index.md
  - 课程导学:
    - 课程导学: guide/index.md
    - 16周项目路线: guide/roadmap.md
    - 学习与AI协作规范: guide/learning-method.md
  - 第一篇｜AI 协同开发实战:
    - 本篇导读：图书管理系统带练: chapter01/index.md
    - 01 认识项目：体验系统与阅读文档: chapter01/01-intro.md
    - 02 准备工具：Trae 与 Superpowers-zh: chapter01/02-ai-tools.md
    - 03 建立规则：Rules、Skills 与 AGENTS.md: chapter01/03-ai-rules.md
    - 04 分步开发：从模板到功能闭环: chapter01/04-development.md
    - 05 测试部署：验证并交付项目: chapter01/05-deployment.md
  - 第二篇｜项目选题与需求分析:
    - 本篇导读：从想法到需求文档: chapter02/index.md
    - 01 选好项目：问题、调研与范围: chapter02/01-topic-research.md
    - 02 项目立项：目标、计划与可行性: chapter02/02-proposal-review.md
    - 03 梳理需求：用户、功能与业务规则: chapter02/03-user-needs.md
    - 04 完成文档：需求说明书与检查: chapter02/04-document-review.md
  - 第三篇｜原型与系统设计:
    - 本篇导读：原型与系统设计: chapter03/index.md
  - 项目选题库: projects/index.md
  - 文档与任务模板: doc-templates/index.md

#   - 第二篇｜项目选题与需求分析:
    # - 本篇导读：从想法到需求文档: chapter02/index.md
    # - 01 选好项目：问题、调研与范围: chapter02/01-topic-research.md
    # - 02 项目立项：目标、计划与可行性: chapter02/02-proposal-review.md
    # - 03 理解用户：角色、场景与需求: chapter02/03-user-needs.md
    # - 04 明确功能：流程、规则与边界: chapter02/04-functions.md
    # - 05 定义完成：验收标准与质量要求: chapter02/05-non-functional.md
    # - 06 完成文档：需求说明书与检查: chapter02/06-document-review.md
#   

plugins:
  - search:
      lang: zh

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

