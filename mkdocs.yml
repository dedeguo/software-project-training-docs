    - 03 建立规则：Rules、Skills 与 AGENTS.md: phase1/03-ai-rules.md
    - 04 分步开发：从模板到功能闭环: phase1/04-development.md
    - 05 测试部署：验证并交付项目: phase1/05-deployment.md
