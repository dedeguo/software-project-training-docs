theme:
  name: material
  language: zh
  palette:
    primary: indigo
    accent: blue
  features:
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow
