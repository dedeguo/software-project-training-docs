site_name: 软件开发综合项目实训
site_description: 《软件开发综合项目实训——AI辅助的软件项目开发》电子教程
site_url: https://project-ai.chende.top/
# repo_url: https://github.com/dedeguo/software-project-training-docs
# repo_name: dedeguo/software-project-training-docs

theme:
  name: material
  language: zh
  palette:
    primary: indigo
    accent: blue
  features:
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow

nav:
  - 课程首页: index.md
  - 课程导学:
      - 16周项目路线: guide/roadmap.md
      - 学习与AI协作规范: guide/learning-method.md
  - 第一篇｜开发准备与AI编程:
      - 本篇导读: chapter01/index.md
      - 开发环境与项目工具链: chapter01/01-environment.md
      - AI辅助编程工作流: chapter01/02-ai-coding.md
  - 第二篇｜项目选题与需求分析:
      - 本篇导读: chapter02/index.md
      - 项目选题与范围控制: chapter02/01-topic-selection.md
      - 用户需求与业务流程: chapter02/02-requirements.md
  - 第三篇｜原型与系统设计:
      - 本篇导读: chapter03/index.md
  - 第四篇｜项目骨架与工程规范:
      - 本篇导读: chapter04/index.md
  - 第五篇｜核心业务开发:
      - 本篇导读: chapter05/index.md
  - 第六篇｜AI功能扩展:
      - 本篇导读: chapter06/index.md
  - 第七篇｜测试与质量改进:
      - 本篇导读: chapter07/index.md
  - 第八篇｜部署上线:
      - 本篇导读: chapter08/index.md
  - 第九篇｜成果包装:
      - 本篇导读: chapter09/index.md
  - 第十篇｜验收与答辩:
      - 本篇导读: chapter10/index.md
  - 项目选题库: projects/index.md
  - 文档与任务模板: templates/index.md

plugins:
  - search:
      lang: zh

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

copyright: Copyright &copy; 2026 陈德
